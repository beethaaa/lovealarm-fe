name: Android Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode Android keystore
        run: |
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK and AAB
        working-directory: android
        run: ./gradlew clean assembleRelease bundleRelease -PVERSION_CODE=${{ github.run_number }} --stacktrace

      - name: Delete old GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="latest-android"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
          else
            git push origin ":refs/tags/$TAG" || true
          fi

      - name: Create new GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="latest-android"
          TITLE="Latest Android Build"
          NOTES="Automatic release from commit ${{ github.sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -f "$TAG" "${{ github.sha }}"
          git push -f origin "$TAG"

          APK_FILES=(android/app/build/outputs/apk/release/*.apk)
          AAB_FILES=(android/app/build/outputs/bundle/release/*.aab)
          APK_PATH="${APK_FILES[0]}"
          AAB_PATH="${AAB_FILES[0]}"

          cp "$APK_PATH" dearu-android-latest.apk
          cp "$AAB_PATH" dearu-android-latest.aab

          gh release create "$TAG" \
            dearu-android-latest.apk \
            dearu-android-latest.aab \
            --target "${{ github.sha }}" \
            --title "$TITLE" \
            --notes "$NOTES" \
            --latest

      # - name: Upload APK
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: dearu-android-apk-${{ github.run_number }}
      #     path: android/app/build/outputs/apk/release/*.apk
      #     if-no-files-found: error

